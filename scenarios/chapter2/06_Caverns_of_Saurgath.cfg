    {STARTING_VILLAGES 7 10}
    {STARTING_VILLAGES 5 13}
    {STARTING_VILLAGES 4 13}
    {STARTING_VILLAGES 3 6}
    {STARTING_VILLAGES_AREA 6 13 24 3}
    {STARTING_VILLAGES_AREA 6 23 27 3}
    {STARTING_VILLAGES_AREA 6 18 21 3}
    {STARTING_VILLAGES_AREA 5 27 35 7}
    
    [event]
    name=prestart 

#ifdef MULTIPLAYER
        [terrain]
            x=22,24
            y=47,46
            terrain=Ko 
        [/terrain]
#else  
        [terrain]
            x,y=23,47
            terrain=Ko 
        [/terrain]
#endif
        [hide_unit]
            id=Kalenz,Landar
        [/hide_unit]

        [remove_shroud]
            side=1,2
            x,y,radius=28,53,3
        [/remove_shroud]
#Treasury Guard:
        {UNIT 6 "Saurian Flanker" 21 13 ()}{LOYAL_GUARDIAN}
#Prison Guards: 
        {LOYAL_UNIT 6 "Water Serpent" 8 22}{GUARDIAN}
        {LOYAL_UNIT 6 "Water Serpent" 11 20}{GUARDIAN}
        
        {LOYAL_UNIT 6 "Forest Lion" 4 19}
        {LOYAL_UNIT 6 "Forest Lion" 8 17}
    [/event]

    [event]
    name=start 

        [move_unit_fake]
            type=Elvish High Lord
            side=1 
            x=28,27
            y=58,53
        [/move_unit_fake]

        [unit]
            {ERLORNAS}
            x,y=27,53
        [/unit]

        [unhide_unit]
            id=Kalenz 
        [/unhide_unit]

        {MOVE_UNIT id=Kalenz 28 52}

        [unhide_unit]
            id=Landar
        [/unhide_unit]

        {MOVE_UNIT id=Landar 27 54}

        [move_unit_fake]
            type=Elvish Shyde
            side=1 
            x=28,28
            y=58,53
        [/move_unit_fake]

        [unit]
            {CLEODIL_COMPANION}
            x,y=28,53
        [/unit]

        [recall]
            id=Anduilas 
            show=no
            x,y=28,58 
        [/recall]

        {MOVE_UNIT id=Anduilas 29 54}

        [recall]
            id=Arkildur
            show=no
            x,y=28,58 
        [/recall]

        {MOVE_UNIT id=Arkildur 28 54}

        [message]
            speaker=Landar 
            message=_ "Hark! A hundred hissing voices follow close behind us... the lizards give chase!"
        [/message]
        [message]
            speaker=Cleodil
            message=_ "Roots strong and deep, I ask of you - shut the mouth of this cave so that none may follow!"
        [/message]

        [animate_unit]
            flag=healing
            [filter]
                id=Cleodil 
            [/filter]
            [facing]
                x,y=28,57 
            [/facing]
        [/animate_unit]

        {QUAKE "cave-in.ogg"}

        [terrain]
            x=28
            y=58-59
            terrain=Xue
        [/terrain]

        [redraw][/redraw]

        [animate_unit]
            flag=healing
            [filter]
                id=Cleodil 
            [/filter]
            [facing]
                x,y=28,57 
            [/facing]
        [/animate_unit]

        {QUAKE "entangle.wav"}

        [terrain]
            x,y=28,57 
            terrain=Xuf
        [/terrain]
        [redraw][/redraw]

        [message]
            speaker=Kalenz
            message=_ "Well done, my lady. Now let us storm this saurian guardtower and regather ourselves there."
        [/message]

        [scroll_to]
            x,y=23,47 
        [/scroll_to]

        [remove_shroud]
            side=1,2
            x,y,radius=23,47,5
        [/remove_shroud]
        [redraw][/redraw]

        [message]
            side=3
            canrecruit=yes
            message=_ "What is thisss? Sssoftssskins on the loossse? Wardens, ssseize them!"
        [/message]

        [scroll_to_unit]
            id=Kalenz 
        [/scroll_to_unit]

        [objectives]
            side=0
            [objective]
                description= _ "Kill the green enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Kalenz"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Landar"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Cleodil"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Erlornas"
                condition=lose
            [/objective]
            {TURNS_RUN_OUT}
            [gold_carryover]
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]

    [event]
    name=die 
    first_time_only=no 

        [filter]
            side=3
            canrecruit=yes 
        [/filter]

        [if]
            [not]
                [have_unit]
                    side=3
                    canrecruit=yes 
                [/have_unit]
            [/not]
        [then]
            [message]
                speaker=Landar
                message=_ "The tower is ours!"
            [/message]
            [message]
                speaker=Kalenz
                message=_ "Now that we have a moment, I wish to ask our lord - how is it you know where this cave leads us?"
            [/message]
            [message]
                speaker=Erlornas
                message=_ "While held captive, I peered into the dreams of the saurians. Amidst their hazy memories and crude streams of thought, I saw the image of this cave through which they raid the north. I memorized the path - there is a fork ahead of us with the left passage leading to their treasury and the right to a number of enclosures housing creatures of some kind. Then the passages merge into a narrow tunnel that leads right to the surface."
            [/message]
            [message]
                speaker=Kalenz
                message=_ "Which path shall we take, friends?"
            [/message]
            [message]
                speaker=Landar
                message=_ "I would march left and take their treasury, so as to deprive them of all rewards which their cowardly raids gathered."
            [/message]
            [message]
                speaker=Cleodil
                message=_ "Let us take the right path. I know not what manner of creature these saurians keep, but I might bring them around to our side if they suffer mistreatment from their cruel masters."
            [/message]

            [objectives]
                side=0
                [objective]
                    description= _ "Move any character to the northern map border"
                    condition=win
                [/objective]
                [objective]
                    description= _ "Death of Kalenz"
                    condition=lose
                [/objective]
                [objective]
                    description= _ "Death of Landar"
                    condition=lose
                [/objective]
                [objective]
                    description= _ "Death of Cleodil"
                    condition=lose
                [/objective]
                [objective]
                    description= _ "Death of Erlornas"
                    condition=lose
                [/objective]
                {TURNS_RUN_OUT}
                [gold_carryover]
                    carryover_percentage=40
                [/gold_carryover]
            [/objectives]
        [/then]
        [/if]
    [/event]


### Treasury ###

    [event]
    name=sighted
    first_time_only=no 

        [filter]
            race=lizard 
            x,y=21,13
        [/filter]
        [filter_second]
            side=1,2
        [/filter_second]

        {HIGHLIGHT_IMAGE 21 13 items/chest.png ()}

        [message]
            speaker=unit
            message=_ "Ssstay back! A hex be upon all who sssteal the treasure of our emperor!"
        [/message]
        [message]
            speaker=Landar
            message=_ "I doubt your coffers are even half full with your little emperor's trinkets."
        [/message]
    [/event]
    [event]
    name=moveto 

        [filter]
            side=1,2
            [filter_location]
                x,y=21,13
            [/filter_location]
        [/filter]

        [message]
            speaker=unit
            message=_ "This must be their treasury... tis all but two thousand pieces of gold!"
        [/message]

        {REMOVE_IMAGE 21 13}

#ifdef MULTIPLAYER 
        {LOOT 900 1}
        {LOOT 900 2}
#else
        {LOOT 1800 1}
#endif
        [message]
            speaker=Landar
            message=_ "And every piece looks elvish forged. We merely retrieve that which was ours all along."
        [/message]
    [/event]
    
    {OPEN_LION_GATE 6 21 4 19}
    {OPEN_LION_GATE 9 19 8 17}
    
    [event]
    name=moveto

        [filter]
            side=1,2
            id=Kalenz,Landar,Cleodil,Erlornas
            [filter_location]
                y=1
            [/filter_location]
        [/filter]

        [message]
            speaker=unit 
            message= _ "Feel the fresh air, fellows! We are free of the underworld!"
        [/message]

        [endlevel]
            result=victory 
        [/endlevel]
    [/event]
    [event]
        name=scenario_end
        [filter_condition]
            [proceed_to_next_scenario]
            [/proceed_to_next_scenario]
        [/filter_condition]

        [persistent_carryover_store]
            scenario_id = LoW_Chapter_Two
        [/persistent_carryover_store]
    [/event]

    {~add-ons/Legacy_of_Wesmere/utils/deaths.cfg}
    {~add-ons/Legacy_of_Wesmere/utils/amlas.cfg}
[/scenario]
#undef OPEN_LION_GATE
