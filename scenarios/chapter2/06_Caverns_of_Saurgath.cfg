#textdomain wesnoth-low
#define OPEN_LION_GATE X_CAGE Y_CAGE X_LION Y_LION
[event]
    name=moveto
    [filter]
            id=Cleodil
            [and]
                [filter_location]
                    x,y={X_CAGE},{Y_CAGE}
                    radius=1
                [/filter_location]
            [/and]
    [/filter]
    [terrain]
        x,y={X_CAGE},{Y_CAGE}
        terrain=Uu^Pr/o
    [/terrain]
    [sound]
        name="open-chest.wav"
    [/sound]
    {MODIFY_UNIT (x,y={X_LION},{Y_LION}) side 1}
    [redraw]
        side=1
    [/redraw]
    [redraw]
        side=2
    [/redraw]
[/event]
#enddef


[scenario]
    id=06_Caverns_of_Saurgath
    next_scenario=06x_Rest
    name= _ "Caverns of Saurgath"
    {LOW_MAP 06_Caverns_of_Saurgath.map}
    [label]
        text= _ "Saurian Treasury"
        x,y=21,13
    [/label]
    victory_when_enemies_defeated=no
    random_start_time=no
    experience_modifier=100
    carryover_percentage=40
    carryover_add=yes

    {UNDERGROUND}

    {TURNS4 55 50 45 40}

    {SCENARIO_MUSIC the_deep_path.ogg}
    {EXTRA_SCENARIO_MUSIC knalgan_theme.ogg}
    {EXTRA_SCENARIO_MUSIC underground.ogg}
    {EXTRA_SCENARIO_MUSIC suspence.ogg}

    [side]
